name: Warp Desk Build Automation

on:
  push:
    tags:
      - 'v*' # Berjalan otomatis jika Anda membuat tag versi (misal v1.0.1)
  workflow_dispatch: # Tetap bisa dijalankan manual

jobs:
  build-windows:
    name: Build & Release Warp Desk
    runs-on: windows-latest
    permissions:
      contents: write # PENTING: Izin untuk membuat Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup vcpkg
        run: |
          vcpkg integrate install
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Execute Warp-Patcher Script
        shell: bash
        run: |
          chmod +x ./patch_warpdesk.sh
          ./patch_warpdesk.sh

      - name: Build Windows Release
        run: |
          flutter pub get
          flutter build windows --release

      # Langkah baru: Mengemas hasil build menjadi file ZIP agar rapi
      - name: Package for Release
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/runner/Release/* -DestinationPath WarpDesk-Windows.zip

      # Langkah baru: Membuat GitHub Release otomatis
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: WarpDesk-Windows.zip
          name: Warp Desk ${{ github.ref_name }}
          body: |
            ## Release Resmi Warp Desk - PT CPL
            - Berbasis infrastruktur: relay.cplcore.cloud
            - Keamanan: Enkripsi End-to-End dengan Public Key tertanam.
            - Status Server: Ready
          draft: false
          prerelease: false
